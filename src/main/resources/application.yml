server:
  port: 8080
  servlet:
    context-path: /sms
    jsp:
      init-parameters:
        development: true

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/student_db?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
    druid:
      initial-size: 5
      max-active: 20
      min-idle: 5
      max-wait: 60000
      validation-query: SELECT 1
      test-on-borrow: true

  mvc:
    view:
      prefix: /WEB-INF/views/
      suffix: .jsp

mybatis:
  mapper-locations: classpath:mappers/*.xml
  type-aliases-package: com.sms.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 业务配置
app:
  jwt:
    secret: StudentManagementSystem2024SecretKey
    expiration: 1800000  # 30分钟
  grade:
    min-score: 0
    max-score: 100
  login:
    max-attempts: 5
    lock-duration: 1800  # 锁定30分钟